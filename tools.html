<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实用工具 - Kaylin博客</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        /* ============================================
           玻璃拟态博客 - 工具页面样式
           Glassmorphism Blog - Tools Page
           ============================================ */
        :root {
            --bg-primary: #0f0c29;
            --bg-secondary: #302b63;
            --bg-tertiary: #24243e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: 20px;
            --glass-radius: 24px;
            --accent-gradient: linear-gradient(135deg, #7c3aed, #ec4899);
            --accent-purple: #7c3aed;
            --accent-pink: #ec4899;
            --accent-blue: #6c8afd;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 背景光斑 */
        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 0;
        }
        body::before {
            top: -10%; right: -5%; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, transparent 70%);
            filter: blur(80px);
        }
        body::after {
            bottom: 5%; left: -8%; width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(236,72,153,0.25) 0%, transparent 70%);
            filter: blur(80px);
        }
        .bg-blob-blue {
            position: fixed; top: 40%; left: 25%; width: 350px; height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108,138,253,0.2) 0%, transparent 70%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }

        /* 导航栏 */
        nav {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0.8rem 0; position: sticky; top: 0; z-index: 100;
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 1.4rem; font-weight: 700; text-decoration: none;
            background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;
            padding: 6px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.25s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary); background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.15);
        }

        /* 主内容 */
        main {
            flex: 1; max-width: 1000px; margin: 0 auto;
            padding: 2.5rem 1.5rem; width: 100%;
            position: relative; z-index: 1;
        }

        /* ============================================
           页面标题区 - 玻璃容器
           Page Header
           ============================================ */
        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--glass-radius);
        }

        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, rgba(196,181,253,0.85) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* ============================================
           工具卡片网格 - 玻璃拟态风格
           Tools Grid
           ============================================ */
        .tools-grid {
            display: grid;
            /* 自适应列宽，最小280px */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        /* 单个工具卡片 */
        .tool-card {
            /* 玻璃卡片基础样式 */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text-primary);
            display: block;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* 卡片悬浮效果：亮度增加 + 上浮 + 紫色光晕 */
        .tool-card:hover {
            background: var(--glass-bg-hover);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.2);
        }

        /* 工具图标 */
        .tool-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            /* 图标容器：渐变圆形背景 */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .tool-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .tool-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* 工具卡片右下角装饰箭头 */
        .tool-card::after {
            content: '→';
            position: absolute;
            bottom: 1.25rem;
            right: 1.25rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .tool-card:hover::after {
            color: #c4b5fd;
            transform: translateX(4px);
        }

        /* 页脚 */
        footer {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 2rem 1.5rem; text-align: center;
            position: relative; z-index: 1;
        }
        footer p { color: var(--text-muted); font-size: 0.8rem; }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links { gap: 0.25rem; }
            .nav-links a { padding: 5px 10px; font-size: 0.75rem; }
            .tools-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blob-blue"></div>

    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Kaylin Blog</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="articles.html">文章</a>
                <a href="tools.html" class="active">工具</a>
                <a href="https://kaylincloudink.github.io/BiogOther.github.io/index.html">其他</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <main>
        <!-- 页面标题 -->
        <div class="page-header">
            <h1>实用工具箱</h1>
            <p>收集一些方便的小工具，点击卡片即可使用。</p>
        </div>

        <!-- ============================================
             工具卡片网格
             每个 .tool-card 对应一个工具
             href 指向 tools/ 文件夹下的 HTML 文件
             ============================================ -->
        <div class="tools-grid">
            <!-- 工具1：待做事项表 -->
            <a href="tools/todolist.html" class="tool-card">
                <div class="tool-icon">📝</div>
                <h3>待做事项表</h3>
                <p>待做事项表，用于列出待做清单。</p>
            </a>

            <!-- 工具2：倒计时工具 -->
            <a href="tools/resttime.html" class="tool-card">
                <div class="tool-icon">⏲️</div>
                <h3>倒计时工具</h3>
                <p>可显示剩余时间，以及进度条。</p>
            </a>

            <!-- 工具3：仿1127报时台 -->
            <a href="tools/timerader.html" class="tool-card">
                <div class="tool-icon">🔔</div>
                <h3>仿1127报时台</h3>
                <p>目前存在问题，等待修复qwq</p>
            </a>

            <!-- 
                ========== 添加新工具的方法 ==========
                1. 在上方 .tools-grid 容器内复制一份 <a class="tool-card"> 结构
                2. 修改 href 为 "tools/你的文件名.html"
                3. 修改图标（emoji）、标题和描述文字
                4. 确保对应的 html 文件存在于 "tools" 文件夹内
            -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Kaylin Cloudink. 保留所有权利. 网站使用AI编写</p>
    </footer>
</body>
</html>
