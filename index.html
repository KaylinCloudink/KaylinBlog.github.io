<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaylin的个人博客 - 首页</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        /* ============================================
           玻璃拟态博客 - 全局变量定义
           Glassmorphism Blog - CSS Variables
           ============================================ */
        :root {
            /* 背景主色调：深紫到深蓝的渐变底色 */
            --bg-primary: #0f0c29;
            --bg-secondary: #302b63;
            --bg-tertiary: #24243e;

            /* 玻璃卡片核心参数 */
            --glass-bg: rgba(255, 255, 255, 0.08);        /* 玻璃背景：8%白色透明度 */
            --glass-bg-hover: rgba(255, 255, 255, 0.14);   /* 玻璃悬浮：14%白色透明度 */
            --glass-border: rgba(255, 255, 255, 0.15);     /* 玻璃边框：15%白色透明度 */
            --glass-blur: 20px;                              /* 模糊半径 */
            --glass-radius: 24px;                            /* 圆角半径 */

            /* 渐变强调色：紫→粉的流动渐变 */
            --accent-gradient: linear-gradient(135deg, #7c3aed, #ec4899);
            --accent-purple: #7c3aed;
            --accent-pink: #ec4899;
            --accent-blue: #6c8afd;

            /* 文字颜色层级 */
            --text-primary: rgba(255, 255, 255, 0.95);     /* 主文字：95%白色 */
            --text-secondary: rgba(255, 255, 255, 0.6);    /* 次文字：60%白色 */
            --text-muted: rgba(255, 255, 255, 0.35);       /* 弱文字：35%白色 */

            /* 标签与徽章 */
            --tag-bg: rgba(124, 58, 237, 0.2);
            --tag-border: rgba(124, 58, 237, 0.3);
        }

        /* ============================================
           全局重置与基础样式
           Global Reset & Base Styles
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            /* 使用系统字体栈，确保各平台显示一致 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            /* 深色渐变背景：三段式紫蓝过渡 */
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* 防止背景滚动时溢出 */
            overflow-x: hidden;
        }

        /* ============================================
           背景装饰光斑 - 营造玻璃拟态的深度感
           Background Decorative Blobs
           ============================================ */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            /* 光斑不参与交互 */
            pointer-events: none;
            z-index: 0;
        }

        /* 右上角紫色光斑 */
        body::before {
            top: -10%;
            right: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.35) 0%, transparent 70%);
            filter: blur(80px);
        }

        /* 左下角粉色光斑 */
        body::after {
            bottom: 5%;
            left: -8%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.25) 0%, transparent 70%);
            filter: blur(80px);
        }

        /* 额外的蓝色光斑（中间偏左） */
        .bg-blob-blue {
            position: fixed;
            top: 40%;
            left: 25%;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108, 138, 253, 0.2) 0%, transparent 70%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================
           导航栏 - 毛玻璃效果
           Glass Navigation Bar
           ============================================ */
        nav {
            /* 导航栏玻璃效果：更轻的模糊与透明度 */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.8rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo：渐变文字效果 */
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
            /* 渐变文字需要背景裁切到文字 */
            background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.02em;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        /* 导航链接：微型玻璃按钮风格 */
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s ease;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* ============================================
           主内容区域
           Main Content Area
           ============================================ */
        main {
            flex: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            width: 100%;
            /* 确保内容在光斑之上 */
            position: relative;
            z-index: 1;
        }

        /* ============================================
           Hero 区域 - 首页核心展示区
           Hero Section
           ============================================ */
        .hero {
            /* 核心玻璃卡片效果 */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--glass-radius);
            padding: 4rem 3rem;
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Hero内部装饰光晕 */
        .hero::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -15%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
            filter: blur(50px);
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            position: relative;
            /* 渐变文字：从白到浅紫 */
            background: linear-gradient(135deg, #fff 0%, rgba(196, 181, 253, 0.85) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 520px;
            margin: 0 auto 2rem;
            line-height: 1.8;
            position: relative;
        }

        /* 主按钮：渐变实心 + 悬浮发光 */
        .btn-primary {
            display: inline-block;
            padding: 12px 32px;
            border-radius: 14px;
            background: var(--accent-gradient);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
            position: relative;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.45);
        }

        /* ============================================
           最新日志区域 - 玻璃卡片列表
           Recent Posts Section
           ============================================ */
        .recent-posts {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--glass-radius);
            padding: 2.5rem;
        }

        /* 区域标题：左侧渐变装饰线 */
        .recent-posts h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .recent-posts h2::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 2px;
            background: var(--accent-gradient);
            border-radius: 1px;
        }

        /* 单篇日志预览 */
        .post-preview {
            padding: 1.25rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .post-preview:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateX(4px);
        }

        .post-preview h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .post-preview h3 a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .post-preview h3 a:hover {
            color: #c4b5fd;
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .post-excerpt {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        /* ============================================
           页脚 - 底部毛玻璃
           Glass Footer
           ============================================ */
        footer {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* ============================================
           响应式设计 - 移动端适配
           Responsive Design
           ============================================ */
        @media (max-width: 768px) {
            .nav-links { gap: 0.25rem; }
            .nav-links a { padding: 5px 10px; font-size: 0.75rem; }
            .hero { padding: 2.5rem 1.5rem; }
            .hero h1 { font-size: 1.8rem; }
            .hero p { font-size: 0.95rem; }
            .recent-posts { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- 蓝色装饰光斑 -->
    <div class="bg-blob-blue"></div>

    <!-- ========== 导航栏 ========== -->
    <nav>
        <div class="nav-container">

    <!-- ========== 页脚 ========== -->
    <footer>
        <p>&copy; 2026 Kaylin Cloudink. 保留所有权利. 网站使用AI编写</p>
    </footer>
</body>
</html>
