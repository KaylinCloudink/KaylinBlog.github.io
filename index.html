<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaylin的个人博客 - 首页</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        /* 样式与之前完全相同，此处省略以节省篇幅，您可直接沿用原有样式 */
        /* 注：实际使用时请保留完整样式 */
        :root {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --link-color: #0066cc;
            --link-hover: #0052a3;
            --shadow: rgba(0, 0, 0, 0.1);
        }
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #404040;
            --link-color: #66b3ff;
            --link-hover: #99ccff;
            --shadow: rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main { flex: 1; max-width: 1200px; margin: 0 auto; padding: 40px 20px; width: 100%; }
        nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 4px var(--shadow);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--text-color); text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-size: 1rem; transition: color 0.3s; }
        .nav-links a:hover { color: var(--link-color); }
        .nav-links a.active { color: var(--link-color); font-weight: 500; }
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-color);
            transition: all 0.3s;
        }
        .theme-toggle:hover { background-color: var(--border-color); }
        .hero {
            text-align: center;
            padding: 80px 20px;
            background-color: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px var(--shadow);
        }
        .hero h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 30px; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--link-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: var(--link-hover); }
        .recent-posts {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 35px;
            border: 1px solid var(--border-color);
        }
        .recent-posts h2 { font-size: 1.5rem; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        .post-preview { margin-bottom: 25px; }
        .post-preview h3 a { color: var(--text-color); text-decoration: none; font-size: 1.2rem; }
        .post-preview h3 a:hover { color: var(--link-color); }
        .post-meta { font-size: 0.9rem; color: var(--text-secondary); margin: 8px 0; }
        .post-excerpt { color: var(--text-secondary); }
        footer {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 30px 20px;
            text-align: center;
        }
        footer p { color: var(--text-secondary); font-size: 0.9rem; }
        @media (max-width: 768px) { .nav-links { gap: 1rem; } .hero h1 { font-size: 1.8rem; } .hero p { font-size: 1rem; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Kaylin博客</a>
            <div class="nav-links">
                <a href="index.html" class="active">首页</a>
                <a href="articles.html">文章列表</a>
                <!-- 新增“工具”导航链接 -->
                <a href="tools.html">工具</a>
                <a href="about.html">关于我</a>
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>欢迎来到Kaylin Blog</h1>
            <p>这里记录着我的学习笔记,希望我的文章能给你带来一些启发和帮助。</p>
            <a href="articles.html" class="btn">浏览文章</a>
        </section>

        <div class="recent-posts">
            <h2>最新日志</h2>
            <div class="post-preview">
                <h3>网页成功上线！</a></h3>
                <div class="post-meta">2026年4月15日 </div>
                <p class="post-excerpt">在通宵一夜之后，我这个代码小白成功的将博客部署到Github上了.</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Kaylin Cloudink. 保留所有权利. 网站使用AI编写</p>
    </footer>

    <script>
        function getCurrentTheme() { return localStorage.getItem('theme') || 'light'; }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const current = getCurrentTheme();
            setTheme(current === 'light' ? 'dark' : 'light');
        }
        document.addEventListener('DOMContentLoaded', () => setTheme(getCurrentTheme()));
    </script>
</body>
</html>
