<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>灵动待办清单 | 优先级动态红框 + 导出TXT + 暗色模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        /* 浅色主题（默认） */
        :root {
            --bg-gradient-start: #e9f0f5;
            --bg-gradient-end: #d9e2ec;
            --card-bg: rgba(255, 255, 255, 0.96);
            --header-bg: #1f2b3c;
            --header-text: white;
            --sub-color: #bdc4d0;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --border-light: #eef2f6;
            --accent: #3b9e5c;
            --accent-hover: #2c7a4a;
            --btn-bg: #f1f5f9;
            --btn-hover: #e2e8f0;
            --delete-hover-bg: #fee2e2;
            --empty-color: #8ba0bc;
            --shadow: rgba(0,0,0,0.1);
        }

        /* 深色主题 */
        body.dark {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.96);
            --header-bg: #0f172a;
            --header-text: #f1f5f9;
            --sub-color: #94a3b8;
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
            --border-light: #334155;
            --accent: #4ade80;
            --accent-hover: #22c55e;
            --btn-bg: #334155;
            --btn-hover: #475569;
            --delete-hover-bg: #450a0a;
            --empty-color: #64748b;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主卡片容器 */
        .todo-card {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px var(--shadow), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 头部 */
        .header {
            background: var(--header-bg);
            padding: 1.8rem 2rem;
            color: var(--header-text);
            position: relative;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1::before {
            content: "✓";
            background: var(--accent);
            width: 38px;
            height: 38px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .sub {
            color: var(--sub-color);
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* 返回工具列表链接 + 主题切换按钮容器 */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .back-link {
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-3px);
        }
        .theme-toggle-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 40px;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.2s;
        }
        .theme-toggle-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(0.96);
        }

        /* 添加区域 */
        .add-section {
            padding: 1.5rem 2rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .input-group {
            flex: 3;
            min-width: 180px;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border-light);
            border-radius: 18px;
            font-size: 1rem;
            transition: 0.2s;
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 158, 92, 0.2);
        }

        .priority-selector {
            flex: 1;
            min-width: 130px;
        }

        .priority-selector select {
            width: 100%;
            padding: 12px 12px;
            border-radius: 18px;
            border: 1.5px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
        }

        .add-btn {
            background: var(--accent);
            border: none;
            padding: 0 26px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .add-btn:hover {
            background: var(--accent-hover);
            transform: scale(0.97);
        }

        /* 清单统计栏 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-light);
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 8px;
        }

        .export-btn {
            background: var(--accent);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .export-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* 待办列表容器 */
        .todo-list-container {
            padding: 0.5rem 0 1.5rem 0;
            background: var(--card-bg);
            max-height: 550px;
            overflow-y: auto;
        }

        .todo-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            margin: 6px 12px;
            background: var(--card-bg);
            border-radius: 20px;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-light);
        }

        .todo-item.high-priority-border {
            border: 2px solid #e53e3e;
            box-shadow: 0 0 0 1px rgba(229, 62, 62, 0.2), 0 4px 12px rgba(229, 62, 62, 0.15);
            animation: pulseRedBorder 1.2s infinite ease-in-out;
        }

        @keyframes pulseRedBorder {
            0% { border-color: #e53e3e; box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.3); }
            50% { border-color: #ff7b7b; box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.5); }
            100% { border-color: #e53e3e; box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.2); }
        }

        .check-wrapper input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .task-text {
            flex: 3;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-word;
            transition: 0.2s;
        }

        .task-text.completed-task {
            color: var(--accent);
            text-decoration: line-through;
            opacity: 0.8;
            font-weight: normal;
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        select.priority-select {
            padding: 7px 10px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }

        .delete-btn {
            background: transparent;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: var(--delete-hover-bg);
            color: #e53e3e;
            transform: scale(1.05);
        }

        .empty-message {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--empty-color);
            font-size: 0.95rem;
            background: var(--card-bg);
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .todo-item { flex-wrap: wrap; padding: 12px 16px; }
            .task-text { flex-basis: 100%; order: 1; margin: 6px 0 6px 32px; }
            .check-wrapper { order: 0; }
            .right-actions { order: 2; margin-left: 32px; width: calc(100% - 32px); justify-content: flex-start; }
            .add-section { flex-direction: column; align-items: stretch; }
            .add-btn { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="todo-card">
    <div class="header">
        <div class="header-actions">
            <a href="https://kaylincloudink.github.io/KaylinBlog.github.io/tools.html" class="back-link">← 返回工具列表</a>
            <button class="theme-toggle-btn" id="themeToggle" aria-label="切换主题">🌙</button>
        </div>
        <h1>灵动·优先级清单</h1>
        <div class="sub">✔️ 勾选即绿 · ⭐ 最优先级动态红框 + 自动置顶</div>
    </div>

    <div class="add-section">
        <div class="input-group">
            <label>📝 新任务</label>
            <input type="text" id="newTaskInput" placeholder="写代码, 读书, 运动..." autocomplete="off">
        </div>
        <div class="priority-selector">
            <label>🏷️ 默认优先级</label>
            <select id="defaultPrioritySelect">
                <option value="normal">普通</option>
                <option value="high">⭐ 最优先级</option>
            </select>
        </div>
        <button class="add-btn" id="addTaskBtn">+ 添加任务</button>
    </div>

    <div class="stats-bar">
        <span>📋 待办统计: <span id="taskCount">0</span> 项 · <span id="completedCount">0</span> 已完成</span>
        <button class="export-btn" id="exportTxtBtn">📎 导出清单 (.txt)</button>
    </div>

    <div class="todo-list-container">
        <ul class="todo-list" id="todoList">
            <li class="empty-message">✨ 暂无待办，添加一条新任务吧</li>
        </ul>
    </div>
</div>

<script>
    // ---------- 任务数据模型 ----------
    let tasks = [];

    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // 排序规则
    function getSortedTasks() {
        const unfinished = tasks.filter(t => !t.completed);
        const finished = tasks.filter(t => t.completed);
        const sortedUnfinished = [...unfinished].sort((a, b) => {
            if (a.priority === 'high' && b.priority !== 'high') return -1;
            if (a.priority !== 'high' && b.priority === 'high') return 1;
            return a.id.localeCompare(b.id);
        });
        const sortedFinished = [...finished].sort((a, b) => a.id.localeCompare(b.id));
        return [...sortedUnfinished, ...sortedFinished];
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateStats() {
        document.getElementById('taskCount').innerText = tasks.length;
        document.getElementById('completedCount').innerText = tasks.filter(t => t.completed).length;
    }

    function renderTodoList() {
        const listContainer = document.getElementById('todoList');
        const sorted = getSortedTasks();
        if (!sorted.length) {
            listContainer.innerHTML = '<li class="empty-message">📭 清单空空如也，添加新任务吧~</li>';
            updateStats();
            return;
        }
        let html = '';
        for (const task of sorted) {
            const completedClass = task.completed ? 'completed-task' : '';
            const checkedAttr = task.completed ? 'checked' : '';
            const isHighSelected = task.priority === 'high';
            const isHighPriorityUnfinished = (!task.completed && task.priority === 'high');
            const borderClass = isHighPriorityUnfinished ? 'high-priority-border' : '';
            const safeText = escapeHtml(task.text);
            html += `
                <li class="todo-item ${borderClass}" data-task-id="${task.id}">
                    <div class="check-wrapper">
                        <input type="checkbox" class="task-checkbox" ${checkedAttr} data-id="${task.id}">
                    </div>
                    <div class="task-text ${completedClass}">${safeText}</div>
                    <div class="right-actions">
                        <select class="priority-select" data-id="${task.id}">
                            <option value="normal" ${!isHighSelected ? 'selected' : ''}>普通</option>
                            <option value="high" ${isHighSelected ? 'selected' : ''}>⭐ 最优先级</option>
                        </select>
                        <button class="delete-btn" data-id="${task.id}" title="删除任务">🗑️</button>
                    </div>
                </li>
            `;
        }
        listContainer.innerHTML = html;
        updateStats();
    }

    function addNewTask() {
        const inputEl = document.getElementById('newTaskInput');
        const text = inputEl.value.trim();
        if (text === '') {
            alert('请填写任务内容');
            return;
        }
        const defaultPriority = document.getElementById('defaultPrioritySelect').value;
        const newTask = {
            id: generateId(),
            text: text,
            completed: false,
            priority: defaultPriority,
            createdAt: Date.now()
        };
        tasks.push(newTask);
        inputEl.value = '';
        renderTodoList();
    }

    function deleteTaskById(taskId) {
        tasks = tasks.filter(t => t.id !== taskId);
        renderTodoList();
    }

    function toggleComplete(taskId, isChecked) {
        const task = tasks.find(t => t.id === taskId);
        if (task) {
            task.completed = isChecked;
            renderTodoList();
        }
    }

    function changePriority(taskId, newPriority) {
        const task = tasks.find(t => t.id === taskId);
        if (task && (newPriority === 'high' || newPriority === 'normal')) {
            task.priority = newPriority;
            renderTodoList();
        }
    }

    function exportToTxt() {
        if (tasks.length === 0) {
            alert('暂无任务可导出，请先添加待办事项');
            return;
        }
        const sortedTasksForExport = getSortedTasks();
        let contentLines = [];
        contentLines.push('===== 我的待办清单 =====');
        contentLines.push(`导出时间: ${new Date().toLocaleString()}`);
        contentLines.push('----------------------------------------');
        for (const task of sortedTasksForExport) {
            const statusSymbol = task.completed ? '✓' : '○';
            const priorityLabel = task.priority === 'high' ? '最优先级' : '普通';
            contentLines.push(`[${statusSymbol}] ${task.text} (优先级: ${priorityLabel})`);
        }
        contentLines.push('----------------------------------------');
        contentLines.push(`总计: ${tasks.length} 项 | 已完成: ${tasks.filter(t=>t.completed).length} 项`);
        const fileContent = contentLines.join('\n');
        const blob = new Blob([fileContent], {type: 'text/plain;charset=utf-8'});
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `todo_list_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function bindGlobalEvents() {
        const todoContainer = document.getElementById('todoList');
        todoContainer.addEventListener('change', (e) => {
            if (e.target && e.target.classList.contains('task-checkbox')) {
                const taskId = e.target.getAttribute('data-id');
                const isChecked = e.target.checked;
                toggleComplete(taskId, isChecked);
            }
            if (e.target && e.target.classList.contains('priority-select')) {
                const taskId = e.target.getAttribute('data-id');
                const newPriority = e.target.value;
                changePriority(taskId, newPriority);
            }
        });
        todoContainer.addEventListener('click', (e) => {
            if (e.target && (e.target.classList.contains('delete-btn') || e.target.parentElement?.classList.contains('delete-btn'))) {
                let targetBtn = e.target;
                if (!targetBtn.classList.contains('delete-btn') && targetBtn.parentElement) {
                    targetBtn = targetBtn.parentElement;
                }
                const taskId = targetBtn.getAttribute('data-id');
                if (taskId && confirm('确定删除此项吗？')) {
                    deleteTaskById(taskId);
                }
                e.stopPropagation();
            }
        });
        document.getElementById('addTaskBtn').addEventListener('click', addNewTask);
        document.getElementById('newTaskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addNewTask();
        });
        document.getElementById('exportTxtBtn').addEventListener('click', exportToTxt);
    }

    // 主题切换
    function initTheme() {
        const saved = localStorage.getItem('todoTheme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').innerHTML = '☀️';
        } else {
            document.body.classList.remove('dark');
            document.getElementById('themeToggle').innerHTML = '🌙';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('todoTheme', 'light');
            document.getElementById('themeToggle').innerHTML = '🌙';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('todoTheme', 'dark');
            document.getElementById('themeToggle').innerHTML = '☀️';
        }
    }

    function initDemoData() {
        tasks = [
            { id: generateId(), text: '🔴 最优先级任务：完成项目报告 (红色描边+置顶)', completed: false, priority: 'high' },
            { id: generateId(), text: '📌 普通任务：整理文档', completed: false, priority: 'normal' },
            { id: generateId(), text: '✅ 已完成示例：阅读半小时 (勾选后绿色)', completed: true, priority: 'normal' },
            { id: generateId(), text: '⚡ 另一个最优先级：锻炼身体 (也会置顶并有动态红框)', completed: false, priority: 'high' }
        ];
        renderTodoList();
    }

    function init() {
        bindGlobalEvents();
        initDemoData();
        initTheme();
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    }
    init();
</script>
</body>
</html>
