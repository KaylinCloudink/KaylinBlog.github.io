<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - Kaylin的个人博客</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        /* ============================================
           玻璃拟态博客 - 关于我页面样式
           Glassmorphism Blog - About Page
           ============================================ */
        :root {
            --bg-primary: #0f0c29;
            --bg-secondary: #302b63;
            --bg-tertiary: #24243e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: 20px;
            --glass-radius: 24px;
            --accent-gradient: linear-gradient(135deg, #7c3aed, #ec4899);
            --accent-purple: #7c3aed;
            --accent-pink: #ec4899;
            --accent-blue: #6c8afd;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.35);
            --tag-bg: rgba(124, 58, 237, 0.2);
            --tag-border: rgba(124, 58, 237, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 背景光斑 */
        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 0;
        }
        body::before {
            top: -10%; right: -5%; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, transparent 70%);
            filter: blur(80px);
        }
        body::after {
            bottom: 5%; left: -8%; width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(236,72,153,0.25) 0%, transparent 70%);
            filter: blur(80px);
        }
        .bg-blob-blue {
            position: fixed; top: 40%; left: 25%; width: 350px; height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108,138,253,0.2) 0%, transparent 70%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }

        /* 导航栏 */
        nav {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0.8rem 0; position: sticky; top: 0; z-index: 100;
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 1.4rem; font-weight: 700; text-decoration: none;
            background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;
            padding: 6px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.25s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary); background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.15);
        }

        /* 主内容 */
        main {
            flex: 1; max-width: 900px; margin: 0 auto;
            padding: 2.5rem 1.5rem; width: 100%;
            position: relative; z-index: 1;
        }

        /* ============================================
           个人资料卡片 - 核心展示区
           Profile Card
           ============================================ */
        .profile-card {
            /* 玻璃卡片基础 */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--glass-radius);
            padding: 3.5rem 2.5rem;
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* 资料卡片顶部渐变装饰 */
        .profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 60%);
            filter: blur(50px);
        }

        /* 头像容器：渐变边框环绕 */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            overflow: hidden;
            position: relative;
            /* 渐变边框效果 */
            padding: 3px;
            background: var(--accent-gradient);
        }

        /* 头像图片 */
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            /* 内层边框 */
            border: 3px solid var(--bg-primary);
        }

        .profile-card h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            position: relative;
            background: linear-gradient(135deg, #fff 0%, rgba(196,181,253,0.85) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .profile-title {
            color: #c4b5fd;
            font-size: 1rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .profile-bio {
            color: var(--text-secondary);
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.8;
            position: relative;
        }

        /* ============================================
           内容区块 - 通用玻璃卡片
           Section Blocks
           ============================================ */
        .section {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        /* 区块标题：底部渐变装饰线 */
        .section h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .section h2::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            width: 50px; height: 2px;
            background: var(--accent-gradient);
            border-radius: 1px;
        }

        .section p {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* ============================================
           技能标签 - 玻璃药丸
           Skill Tags
           ============================================ */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .skill-tag {
            /* 玻璃药丸形标签 */
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: var(--tag-bg);
            color: #c4b5fd;
            border: 1px solid var(--tag-border);
            transition: all 0.25s ease;
            cursor: default;
        }

        .skill-tag:hover {
            background: rgba(124, 58, 237, 0.35);
            border-color: rgba(124, 58, 237, 0.5);
            transform: translateY(-2px);
        }

        /* ============================================
           联系方式列表
           Contact List
           ============================================ */
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* 单个联系方式条目 */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }

        /* 联系方式图标容器 */
        .contact-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            /* 渐变图标背景 */
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .contact-info h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .contact-info h4 a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .contact-info h4 a:hover {
            color: #c4b5fd;
        }

        .contact-info p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* 页脚 */
        footer {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 2rem 1.5rem; text-align: center;
            position: relative; z-index: 1;
        }
        footer p { color: var(--text-muted); font-size: 0.8rem; }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links { gap: 0.25rem; }
            .nav-links a { padding: 5px 10px; font-size: 0.75rem; }
            .profile-card { padding: 2rem 1.5rem; }
            .avatar { width: 100px; height: 100px; }
            .profile-card h1 { font-size: 1.5rem; }
            .section { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    </main>

    </footer>
</body>
</html>
