<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - Kaylin的个人博客</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        /* ============================================
           玻璃拟态博客 - 全局变量定义
           ============================================ */
        :root {
            --bg-primary: #0f0c29;
            --bg-secondary: #302b63;
            --bg-tertiary: #24243e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: 20px;
            --glass-radius: 24px;
            --accent-gradient: linear-gradient(135deg, #7c3aed, #ec4899);
            --accent-purple: #7c3aed;
            --accent-pink: #ec4899;
            --accent-blue: #6c8afd;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.35);
            --tag-bg: rgba(124, 58, 237, 0.2);
            --tag-border: rgba(124, 58, 237, 0.3);
        }

        /* ============================================
           全局重置
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 背景装饰光斑 */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            top: -10%; right: -5%; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, transparent 70%);
            filter: blur(80px);
        }
        body::after {
            bottom: 5%; left: -8%; width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(236,72,153,0.25) 0%, transparent 70%);
            filter: blur(80px);
        }

        .bg-blob-blue {
            position: fixed; top: 40%; left: 25%; width: 350px; height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108,138,253,0.2) 0%, transparent 70%);
            filter: blur(60px); pointer-events: none; z-index: 0;
        }

        /* ============================================
           导航栏
           ============================================ */
        nav {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0.8rem 0; position: sticky; top: 0; z-index: 100;
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 1.4rem; font-weight: 700; text-decoration: none;
            background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;
            padding: 6px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.25s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary); background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.15);
        }

        /* ============================================
           主内容区域
           ============================================ */
        main {
            flex: 1; max-width: 900px; margin: 0 auto;
            padding: 2.5rem 1.5rem; width: 100%;
            position: relative; z-index: 1;
        }

        /* 页面标题区 */
        .page-header {
            margin-bottom: 2.5rem;
            padding: 2rem 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--glass-radius);
        }
        .page-header h1 {
            font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, rgba(196,181,253,0.85) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-header p {
            color: var(--text-secondary); font-size: 0.9rem;
        }

        /* ============================================
           文章列表 - 玻璃卡片网格
           Article List - Glass Card Grid
           ============================================ */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* 单篇文章卡片 */
        .article-item {
            /* 玻璃卡片基础效果 */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s ease;
            cursor: pointer;
            /* 悬浮时的微位移效果 */
        }

        .article-item:hover {
            background: var(--glass-bg-hover);
            border-color: rgba(255, 255, 255, 0.22);
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.15);
        }

        .article-item h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .article-item h2 a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .article-item h2 a:hover {
            color: #c4b5fd;
        }

        /* 文章元信息：日期 + 分类标签 */
        .article-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        /* 分类标签：渐变边框风格 */
        .category-tag {
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            /* 渐变背景 + 半透明 */
            background: var(--tag-bg);
            color: #c4b5fd;
            border: 1px solid var(--tag-border);
        }

        .article-excerpt {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }

        /* "阅读全文"链接 */
        .read-more {
            color: #c4b5fd;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .read-more:hover {
            color: #f9a8d4;
        }

        /* ============================================
           页脚
           ============================================ */
        footer {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 2rem 1.5rem; text-align: center;
            position: relative; z-index: 1;
        }
        footer p { color: var(--text-muted); font-size: 0.8rem; }

        /* ============================================
           响应式
           ============================================ */
        @media (max-width: 768px) {
            .nav-links { gap: 0.25rem; }
            .nav-links a { padding: 5px 10px; font-size: 0.75rem; }
            .article-item { padding: 1.5rem; }
            .page-header { padding: 1.5rem; }
            .page-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blob-blue"></div>

    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Kaylin Blog</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="articles.html" class="active">文章</a>

                <a href="https://kaylincloudink.github.io/BiogOther.github.io/index.html">其他</a>
                <a href="about.html">关于</a>

        </div>
    </nav>

    <main>
        <!-- 页面标题：文章列表 -->
        <div class="page-header">
            <h1>文章列表</h1>
            <p>共收录 2 篇文章</p>
        </div>

        <!-- 文章列表 -->
        <div class="article-list">
            <!-- 文章1：网页上线公告 -->
            <article class="article-item">

            <article class="article-item">

                <div class="article-meta">
                    <span>2026年5月15日</span>

                <p class="article-excerpt">这是一个文章测试页面，没啥可以看的……</p>
                <a href="article1.html" class="read-more">阅读全文 →</a>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Kaylin Cloudink. 保留所有权利. 网站使用AI编写</p>
    </footer>
</body>
</html>
