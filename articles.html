<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - Kaylin的个人博客</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        :root {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --link-color: #0066cc;
            --link-hover: #0052a3;
            --shadow: rgba(0, 0, 0, 0.1);
            --tag-bg: #f0f0f0;
        }
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #404040;
            --link-color: #66b3ff;
            --link-hover: #99ccff;
            --shadow: rgba(0, 0, 0, 0.3);
            --tag-bg: #404040;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main { flex: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; width: 100%; }
        nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 4px var(--shadow);
        }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--text-color); text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--text-color); text-decoration: none; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--link-color); font-weight: 500; }
        .theme-toggle { background: none; border: 1px solid var(--border-color); border-radius: 20px; padding: 8px 16px; cursor: pointer; color: var(--text-color); }
        .page-header { margin-bottom: 40px; }
        .page-header h1 { font-size: 2rem; margin-bottom: 10px; }
        .article-list { display: flex; flex-direction: column; gap: 20px; }
        .article-item {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .article-item:hover { transform: translateY(-3px); box-shadow: 0 6px 12px var(--shadow); }
        .article-item h2 { font-size: 1.4rem; margin-bottom: 10px; }
        .article-item h2 a { color: var(--text-color); text-decoration: none; }
        .article-item h2 a:hover { color: var(--link-color); }
        .article-meta { display: flex; gap: 15px; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 12px; flex-wrap: wrap; }
        .category-tag { background-color: var(--tag-bg); padding: 4px 12px; border-radius: 20px; }
        .read-more { color: var(--link-color); text-decoration: none; font-weight: 500; }
        footer {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 30px 20px;
            text-align: center;
        }
        @media (max-width: 768px) { .nav-links { gap: 1rem; } .article-item { padding: 20px; } }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Kaylin博客</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="articles.html">文章列表</a>
                <a href="tools.html" class="active">工具</a>
                <a href="about.html">关于我</a>
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h1>文章列表</h1>
            <p>共收录 1 篇文章</p>
        </div>
        <div class="article-list">
            <article class="article-item">
                <h2><a href="article1.html">文章测试</a></h2>
                <div class="article-meta">
                    <span>2026年5月15日</span>
                    <span class="category-tag">网页测试</span>
                </div>
                <p class="article-excerpt">这是一个文章测试页面，没啥可以看的……</p>
                <a href="article1.html" class="read-more">阅读全文 →</a>
            </article>
                    <div class="article-list">
            <article class="article-item">
                <h2><a href="article1.html">文章测试</a></h2>
                <div class="article-meta">
                    <span>2026年5月15日</span>
                    <span class="category-tag">网页测试</span>
                </div>
                <p class="article-excerpt">这是一个文章测试页面，没啥可以看的……</p>
                <a href="article1.html" class="read-more">阅读全文 →</a>
            </article>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Kaylin Cloudink. 保留所有权利.</p>
    </footer>

    <script>
        function getCurrentTheme() { return localStorage.getItem('theme') || 'light'; }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() { setTheme(getCurrentTheme() === 'light' ? 'dark' : 'light'); }
        document.addEventListener('DOMContentLoaded', () => setTheme(getCurrentTheme()));
    </script>
</body>
</html>
